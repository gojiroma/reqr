<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reqr - Share URLs Instantly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #faf8f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #3a3a3a;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-in;
        }

        .app-title {
            font-size: 32px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 8px;
        }

        .app-description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .app-features {
            display: flex;
            gap: 16px;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #e8e4df;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e8e4df;
            background: #fdfbf8;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #a89a8f;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: #8b7355;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: #8b7355;
        }

        .tab-content {
            padding: 40px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        /* 受信タブ */
        .receive-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .section-title {
            font-size: 16px;
            color: #5a5a5a;
            text-align: center;
            font-weight: 600;
        }

        .info-box {
            width: 100%;
            background: #faf8f6;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #c9b8a8;
            font-size: 13px;
            color: #6b6b6b;
            line-height: 1.5;
        }

        .qr-code-area {
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #e8e4df;
            display: flex;
            justify-content: center;
        }

        .qr-code-area img {
            max-width: 260px;
            width: 100%;
            height: auto;
        }

        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d4ccc0;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e4df;
        }

        .code-input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            padding: 16px;
            background: #faf8f6;
            border-radius: 10px;
            border: 1px solid #e8e4df;
        }

        .code-input-group p {
            font-size: 12px;
            color: #7b7b7b;
            text-align: center;
        }

        .code-input-group input {
            width: 140px;
            padding: 12px;
            font-size: 28px;
            text-align: center;
            letter-spacing: 8px;
            border: 2px solid #c9b8a8;
            border-radius: 8px;
            font-weight: bold;
            font-family: 'Monaco', 'Courier New', monospace;
            background: white;
            color: #3a3a3a;
            transition: all 0.3s;
        }

        .code-input-group input:focus {
            outline: none;
            border-color: #8b7355;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.08);
            background: #fffbf8;
        }

        .code-input-group input.error {
            border-color: #c85a54;
            color: #c85a54;
        }

        .status-message {
            font-size: 12px;
            color: #999;
            text-align: center;
            min-height: 18px;
        }

        .status-message.error {
            color: #c85a54;
        }

        .status-message.success {
            color: #7a9e6f;
        }

        /* 送信タブ */
        .send-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .url-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #5a5a5a;
        }

        input[type="url"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8e4df;
            border-radius: 8px;
            font-size: 15px;
            background: white;
            color: #3a3a3a;
            transition: all 0.3s;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #8b7355;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.08);
            background: #fffbf8;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #a89a8f;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #8b7355;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.2);
        }

        .btn-clipboard {
            background: #c9b8a8;
            color: white;
            flex: 1;
        }

        .btn-clipboard:hover:not(:disabled) {
            background: #a89a8f;
            box-shadow: 0 4px 12px rgba(169, 154, 143, 0.2);
        }

        .btn:disabled {
            background: #ddd4cc;
            cursor: not-allowed;
            color: #999;
        }

        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result.success {
            background: #f0f5ed;
            border: 2px solid #7a9e6f;
            color: #4a5f43;
            display: block;
        }

        .result.error {
            background: #faf0ed;
            border: 2px solid #c85a54;
            color: #7a3a33;
            display: block;
        }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-number {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            margin-bottom: 8px;
        }

        .result-description {
            font-size: 12px;
            opacity: 0.85;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .copy-btn {
            background: transparent;
            color: inherit;
            border: 1px solid currentColor;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .loading {
            display: none;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e8e4df;
            border-top: 3px solid #8b7355;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .lang-switch {
            position: fixed;
            top: 16px;
            right: 16px;
            background: white;
            border: 1px solid #e8e4df;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .lang-btn {
            background: transparent;
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            color: #a89a8f;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #faf8f6;
            color: #8b7355;
        }
    </style>
</head>

<body>
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('ja')">日本語</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
    </div>

    <div class="container">
        <div class="header">
            <div class="app-title">reqr</div>
            <p class="app-description" id="appDesc">
                URLを瞬時に共有。QRコードや4桁コードでスマートに受け渡し。
            </p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('receive')" id="receiveTabBtn">📲 <span
                        id="tabReceive">受信</span></button>
                <button class="tab-btn" onclick="switchTab('send')" id="sendTabBtn">📤 <span
                        id="tabSend">送信</span></button>
            </div>

            <!-- 受信タブ -->
            <div class="tab-content active" id="receive-tab">
                <div class="receive-section">
                    <div class="section-title" id="receiveTitle">QRコードをスキャン</div>
                    <div class="info-box" id="receiveInfo">
                        相手が「送信」でURLを送ると、ここのQRコードをスキャンするか、4桁コードを入力することでURLが開きます
                    </div>
                    <div class="qr-code-area">
                        <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
                    </div>

                    <div class="divider" id="dividerText">または</div>

                    <div class="code-input-group">
                        <p id="codeInputLabel">4桁のコードを入力</p>
                        <input type="text" id="reservationNumber" placeholder="0000" maxlength="4" pattern="[0-9]*"
                            inputmode="numeric" onkeyup="handleReservationInput(event)">
                        <div class="status-message" id="reservationStatus"></div>
                    </div>
                </div>
            </div>

            <!-- 送信タブ -->
            <div class="tab-content" id="send-tab">
                <div class="send-section">
                    <div class="section-title" id="sendTitle">URLを送信</div>
                    <div class="info-box" id="sendInfo">
                        URLを入力すると、相手が入力できる4桁のコードが生成されます。このコードを相手に教えてください
                    </div>

                    <div class="url-input-group">
                        <label for="urlInput" id="urlLabel">URL</label>
                        <input type="url" id="urlInput" placeholder="https://example.com" required autocomplete="off">
                    </div>

                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p style="margin-top: 10px; color: #666; font-size: 14px;" id="generatingText">生成中...</p>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-clipboard" id="clipboardBtn" onclick="sendFromClipboard()">📋 <span
                                id="clipboardBtnText">クリップボードから</span></button>
                        <button class="btn btn-primary" id="submitBtn" onclick="submitUrl()"><span
                                id="submitBtnText">送信</span></button>
                    </div>

                    <div class="result" id="result">
                        <div class="result-title" id="resultTitle"></div>
                        <div class="result-number" id="resultNumber"></div>
                        <div class="result-description" id="resultDescription"></div>
                        <button class="copy-btn" id="copyBtn" onclick="copyNumber()"><span
                                id="copyBtnText">コピーする</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 言語設定
        let currentLang = navigator.language.startsWith('ja') ? 'ja' : 'en';

        const translations = {
            ja: {
                appDesc: 'URLを瞬時に共有。QRコードや4桁コードでスマートに受け渡し。',
                tabReceive: '受信',
                tabSend: '送信',
                receiveTitle: 'QRコードで受信',
                receiveInfo: '相手の端末でこのQRコードをスキャンするか、生成された4桁コードを入力してください。',
                dividerText: 'または',
                codeInputLabel: '4桁のコードを入力',
                sendTitle: 'URLを送信',
                sendInfo: 'URLを入力して1回限りの共有コードを発行します。',
                urlLabel: 'URL',
                generatingText: '生成中...',
                clipboardBtnText: 'クリップボードから',
                submitBtnText: '送信',
                copyBtnText: 'コピーする',
                codeError: '4桁の数字を入力してください',
                codeNotFound: '無効なコードです',
                connectionError: '通信エラーが発生しました',
                connecting: '接続中...',
                generateSuccess: 'コードを生成しました',
                generatedDesc: '1回限りの使い捨てコードです。受信側の端末に入力するとURLが開きます。',
                errorOccurred: 'エラーが発生しました',
                networkError: 'ネットワークエラー',
                networkErrorDesc: 'サーバーに接続できません',
                emptyClipboard: 'クリップボードにデータがありません',
                emptyClipboardDesc: 'URLをコピーしてからやり直してください',
                invalidUrl: '無効なURL形式',
                invalidUrlDesc: 'http(s)から始まるURLをコピーしてください',
                clipboardError: '読み取り失敗',
                clipboardErrorDesc: 'クリップボードへのアクセスを許可してください',
                copied: 'コピーしました',
                urlRequired: 'URLが未入力です',
                urlFormatError: 'http(s)から始まるURLを入力してください'
            },
            en: {
                appDesc: 'Share URLs instantly using a QR code or 4-digit code.',
                tabReceive: 'Receive',
                tabSend: 'Send',
                receiveTitle: 'Scan QR Code',
                receiveInfo: 'Scan this QR code or enter the 4-digit code to open the URL.',
                dividerText: 'or',
                codeInputLabel: 'Enter 4-digit code',
                sendTitle: 'Send URL',
                sendInfo: 'Generate a one-time code to share your URL).',
                urlLabel: 'URL',
                generatingText: 'Generating...',
                clipboardBtnText: 'From Clipboard',
                submitBtnText: 'Send',
                copyBtnText: 'Copy',
                codeError: 'Enter a 4-digit code',
                codeNotFound: 'Invalid code',
                connectionError: 'Connection failed',
                connecting: 'Connecting...',
                generateSuccess: 'Code generated',
                generatedDesc: 'This is a one-time code. Enter it on the receiving device to open the URL.',
                errorOccurred: 'An error occurred',
                networkError: 'Network error',
                networkErrorDesc: 'Cannot connect to server',
                emptyClipboard: 'Clipboard is empty',
                emptyClipboardDesc: 'Please copy a URL first',
                invalidUrl: 'Invalid URL',
                invalidUrlDesc: 'Copy a URL starting with http(s)',
                clipboardError: 'Access denied',
                clipboardErrorDesc: 'Unable to read clipboard',
                copied: 'Copied',
                urlRequired: 'URL is required',
                urlFormatError: 'URL must start with http(s)'
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            // Update active button
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update all text
            updateTranslations();
        }

        function t(key) {
            return translations[currentLang][key] || translations['ja'][key];
        }

        function updateTranslations() {
            document.getElementById('appDesc').textContent = t('appDesc');
            document.getElementById('tabReceive').textContent = t('tabReceive');
            document.getElementById('tabSend').textContent = t('tabSend');
            document.getElementById('receiveTitle').textContent = t('receiveTitle');
            document.getElementById('receiveInfo').textContent = t('receiveInfo');
            document.getElementById('dividerText').textContent = t('dividerText');
            document.getElementById('codeInputLabel').textContent = t('codeInputLabel');
            document.getElementById('sendTitle').textContent = t('sendTitle');
            document.getElementById('sendInfo').textContent = t('sendInfo');
            document.getElementById('urlLabel').textContent = t('urlLabel');
            document.getElementById('generatingText').textContent = t('generatingText');
            document.getElementById('clipboardBtnText').textContent = t('clipboardBtnText');
            document.getElementById('submitBtnText').textContent = t('submitBtnText');
            document.getElementById('copyBtnText').textContent = t('copyBtnText');
        }

        // Initialize translations
        updateTranslations();

        const roomId = '{{ room_id }}';
        const reservationNumberInput = document.getElementById('reservationNumber');
        const reservationStatus = document.getElementById('reservationStatus');
        const urlInput = document.getElementById('urlInput');
        const submitBtn = document.getElementById('submitBtn');
        const clipboardBtn = document.getElementById('clipboardBtn');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultNumber = document.getElementById('resultNumber');
        const resultDescription = document.getElementById('resultDescription');
        const loading = document.getElementById('loading');
        const copyBtn = document.getElementById('copyBtn');

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');

            if (tab === 'send') {
                setTimeout(() => urlInput.focus(), 100);
            }
        }

        async function checkStatus() {
            try {
                const res = await fetch(`/status/${roomId}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url;
                }
            } catch (err) {
                console.warn('status check failed', err);
            }
        }

        function handleReservationInput(event) {
            const value = event.target.value;
            if (value.length === 4 && /^\d{4}$/.test(value)) {
                applyReservation();
            }
        }

        async function applyReservation() {
            const number = reservationNumberInput.value.trim();
            if (number.length !== 4) {
                reservationStatus.textContent = t('codeError');
                reservationStatus.classList.add('error');
                return;
            }

            try {
                const res = await fetch('/apply_reservation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        room_id: roomId,
                        reservation_number: number
                    })
                });

                if (res.ok) {
                    reservationStatus.textContent = '✓ ' + t('connecting');
                    reservationStatus.classList.add('success');
                    reservationStatus.classList.remove('error');
                    setTimeout(checkStatus, 500);
                } else {
                    reservationNumberInput.classList.add('error');
                    reservationStatus.textContent = '✗ ' + t('codeNotFound');
                    reservationStatus.classList.add('error');
                    reservationStatus.classList.remove('success');

                    setTimeout(() => {
                        reservationNumberInput.classList.remove('error');
                        reservationNumberInput.value = '';
                        reservationStatus.textContent = '';
                        reservationStatus.classList.remove('error');
                    }, 2000);
                }
            } catch (err) {
                reservationNumberInput.classList.add('error');
                reservationStatus.textContent = '✗ ' + t('connectionError');
                reservationStatus.classList.add('error');
                reservationStatus.classList.remove('success');

                setTimeout(() => {
                    reservationNumberInput.classList.remove('error');
                    reservationNumberInput.value = '';
                    reservationStatus.textContent = '';
                    reservationStatus.classList.remove('error');
                }, 2000);
            }
        }

        async function submitUrl() {
            const url = urlInput.value.trim();

            if (!url) {
                alert(t('urlRequired'));
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert(t('urlFormatError'));
                return;
            }

            submitBtn.disabled = true;
            clipboardBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                const res = await fetch('/create_reservation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await res.json();

                if (res.ok) {
                    resultTitle.textContent = '✓ ' + t('generateSuccess');
                    resultNumber.textContent = data.reservation_number;
                    resultDescription.textContent = t('generatedDesc');
                    result.classList.remove('error');
                    result.classList.add('success');
                    result.style.display = 'block';
                    urlInput.value = '';
                    copyBtn.textContent = t('copyBtnText');
                } else {
                    resultTitle.textContent = '✗ ' + t('errorOccurred');
                    resultDescription.textContent = data.error || t('errorOccurred');
                    result.classList.remove('success');
                    result.classList.add('error');
                    result.style.display = 'block';
                }
            } catch (err) {
                resultTitle.textContent = '✗ ' + t('networkError');
                resultDescription.textContent = t('networkErrorDesc');
                result.classList.remove('success');
                result.classList.add('error');
                result.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                clipboardBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        async function sendFromClipboard() {
            clipboardBtn.disabled = true;
            submitBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                const text = await navigator.clipboard.readText();

                if (!text || text.trim() === '') {
                    resultTitle.textContent = '✗ ' + t('emptyClipboard');
                    resultDescription.textContent = t('emptyClipboardDesc');
                    result.classList.remove('success');
                    result.classList.add('error');
                    result.style.display = 'block';
                    return;
                }

                const url = text.trim();

                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    resultTitle.textContent = '✗ ' + t('invalidUrl');
                    resultDescription.textContent = t('invalidUrlDesc');
                    result.classList.remove('success');
                    result.classList.add('error');
                    result.style.display = 'block';
                    return;
                }

                urlInput.value = url;
                await new Promise(resolve => {
                    setTimeout(() => submitUrl(), 100);
                    setTimeout(resolve, 1000);
                });
            } catch (err) {
                resultTitle.textContent = '✗ ' + t('clipboardError');
                resultDescription.textContent = t('clipboardErrorDesc');
                result.classList.remove('success');
                result.classList.add('error');
                result.style.display = 'block';
            } finally {
                clipboardBtn.disabled = false;
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function copyNumber() {
            const number = resultNumber.textContent;
            navigator.clipboard.writeText(number).then(() => {
                copyBtn.textContent = '✓ ' + t('copied');
                setTimeout(() => {
                    copyBtn.textContent = t('copyBtnText');
                }, 2000);
            }).catch(() => {
                alert(t('clipboardError'));
            });
        }

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitUrl();
            }
        });

        window.addEventListener('load', () => {
            checkStatus();
            setInterval(checkStatus, 2000);
        });
    </script>
</body>

</html>
