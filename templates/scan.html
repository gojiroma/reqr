<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL入力</title>
</head>

<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <form action="{{ url_for('redirect_to_url') }}" method="POST">
            <input type="url" name="url" placeholder="URLを入力してください" required>
            <button type="submit">遷移</button>
        </form>
    </div>
</body>

</html>
