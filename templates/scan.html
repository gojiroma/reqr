<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL入力</title>
</head>

<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; padding: 16px;">
        <div style="width: 100%; max-width: 420px; text-align: center;">
            <button id="pasteSendBtn"
                style="width: 100%; aspect-ratio: 1 / 1; border-radius: 50%; border: none; background: #007bff; color: #fff; font-size: 1.15rem; font-weight: bold; padding: 24px; box-shadow: 0 10px 24px rgba(0,0,0,.16);">
                ペーストして送信
            </button>
            <p id="statusMessage" style="margin-top: 20px; font-size: 0.95rem; color: #333; line-height: 1.5;"></p>
        </div>
    </div>
    <script>
        const roomId = '{{ room_id }}';
        const button = document.getElementById('pasteSendBtn');
        const statusMessage = document.getElementById('statusMessage');

        async function postUrl(url) {
            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ room_id: roomId, url }),
                });
                if (res.ok) {
                    statusMessage.textContent = 'URLを送信しました。QR画面でリダイレクトを待っています。';
                    button.disabled = true;
                    button.textContent = '送信済み';
                } else {
                    statusMessage.textContent = '送信に失敗しました。もう一度試してください。';
                }
            } catch (err) {
                statusMessage.textContent = 'ネットワークエラーが発生しました。';
            }
        }

        button.addEventListener('click', async () => {
            statusMessage.textContent = 'クリップボードからURLを読み取っています...';
            try {
                const text = await navigator.clipboard.readText();
                if (!text || !text.startsWith('http')) {
                    statusMessage.textContent = 'クリップボードにURLが見つかりませんでした。URLをコピーしてから再度押してください。';
                    return;
                }
                await postUrl(text.trim());
            } catch (err) {
                statusMessage.textContent = 'クリップボードの読み取りに失敗しました。許可を確認してください。';
            }
        });
    </script>
</body>

</html>
