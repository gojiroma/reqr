<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL入力</title>
</head>

<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <form id="submitForm">
            <input type="hidden" name="room_id" value="{{ room_id }}">
            <input type="url" id="urlInput" name="url" placeholder="URLを入力してください" required>
            <button type="submit">送信</button>
        </form>
        <p id="statusMessage" style="margin-top: 16px; text-align: center;"></p>
    </div>
    <script>
        const roomId = '{{ room_id }}';
        const form = document.getElementById('submitForm');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async event => {
            event.preventDefault();
            const url = document.getElementById('urlInput').value;
            if (!url) return;

            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ room_id: roomId, url }),
                });
                if (res.ok) {
                    statusMessage.textContent = 'URLを送信しました。QR画面でリダイレクトを待っています。';
                    form.querySelector('button').disabled = true;
                } else {
                    statusMessage.textContent = '送信に失敗しました。もう一度試してください。';
                }
            } catch (err) {
                statusMessage.textContent = 'ネットワークエラーが発生しました。';
            }
        });
    </script>
</body>

</html>
