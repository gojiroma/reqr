<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL入力</title>
</head>

<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; padding: 16px;">
        <div style="width: 100%; max-width: 420px; text-align: center;">
            <button id="pasteSendBtn"
                style="width: 100%; aspect-ratio: 1 / 1; border-radius: 50%; border: none; background: #007bff; color: #fff; font-size: 1.15rem; font-weight: bold; padding: 24px; box-shadow: 0 10px 30px rgba(0, 123, 255, 0.3); cursor: pointer; transition: all 0.3s ease; display: none;"
                onmouseover="this.style.background='#0056b3'; this.style.boxShadow='0 15px 40px rgba(0, 123, 255, 0.4)';"
                onmouseout="this.style.background='#007bff'; this.style.boxShadow='0 10px 30px rgba(0, 123, 255, 0.3)';">
                貼り付けて送信
            </button>
            <p id="statusMessage" style="margin-top: 20px; font-size: 3rem; color: #333; line-height: 1.5; font-weight: bold;"></p>
        </div>
    </div>
    <script>
        const roomId = '{{ room_id }}';
        const button = document.getElementById('pasteSendBtn');
        const statusMessage = document.getElementById('statusMessage');

        // 言語判定
        const isJapanese = navigator.language.startsWith('ja');
        const messages = {
            ja: {
                loading: '読み込み中...',
                success: '✓ 送信完了',
                failed: '✗ 送信に失敗しました',
                networkError: '✗ 通信エラー',
                notFound: '✗ URLが見つかりません',
                clipboardError: '✗ 読み取り失敗',
                copyPrompt: 'URLをコピーして\n再度お試しください',
                invalidUrl: '✗ 無効なURL形式\nhttp(s)から始まるURLを\nコピーしてください',
                manualPaste: '貼り付けて送信',
                sent: '送信済み'
            },
            en: {
                loading: 'Loading...',
                success: '✓ Sent successfully',
                failed: '✗ Failed to send',
                networkError: '✗ Network error',
                notFound: '✗ URL not found',
                clipboardError: '✗ Clipboard error',
                copyPrompt: 'Copy URL and\ntry again',
                invalidUrl: '✗ Invalid URL format\nCopy a URL starting\nwith http(s)',
                manualPaste: 'Paste and send',
                sent: 'Sent'
            }
        };

        const msgs = isJapanese ? messages.ja : messages.en;

        async function postUrl(url) {
            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ room_id: roomId, url }),
                });
                if (res.ok) {
                    statusMessage.textContent = msgs.success;
                    statusMessage.style.color = '#28a745';
                    statusMessage.style.fontSize = '4rem';
                    button.disabled = true;
                    button.textContent = msgs.sent;
                } else {
                    statusMessage.textContent = msgs.failed;
                    statusMessage.style.color = '#dc3545';
                    statusMessage.style.fontSize = '3rem';
                }
            } catch (err) {
                statusMessage.textContent = msgs.networkError;
                statusMessage.style.color = '#dc3545';
                statusMessage.style.fontSize = '3rem';
            }
        }

        async function autoSendFromClipboard() {
            statusMessage.textContent = msgs.loading;
            statusMessage.style.fontSize = '2rem';
            statusMessage.style.color = '#666';
            try {
                const text = await navigator.clipboard.readText();
                
                if (!text || text.trim() === '') {
                    // クリップボードが空
                    statusMessage.textContent = msgs.copyPrompt;
                    statusMessage.style.color = '#ff9800';
                    statusMessage.style.fontSize = '2rem';
                    button.style.display = 'block';
                    return;
                }

                const trimmedText = text.trim();
                
                if (!trimmedText.startsWith('http://') && !trimmedText.startsWith('https://')) {
                    // URLがhttp(s)で始まらない
                    statusMessage.textContent = msgs.invalidUrl;
                    statusMessage.style.color = '#ff9800';
                    statusMessage.style.fontSize = '1.8rem';
                    button.style.display = 'block';
                    return;
                }

                await postUrl(trimmedText);
            } catch (err) {
                // クリップボード読み取りエラー
                statusMessage.textContent = msgs.copyPrompt;
                statusMessage.style.color = '#ff9800';
                statusMessage.style.fontSize = '2rem';
                button.style.display = 'block';
            }
        }

        // ページ読み込み時に自動で送信開始
        window.addEventListener('load', () => {
            autoSendFromClipboard();
        });

        // ボタンのフォールバック
        button.addEventListener('click', async () => {
            autoSendFromClipboard();
        });
    </script>
</body>

</html>
