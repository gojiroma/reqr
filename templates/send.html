<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL送信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }

        .description {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn {
            background: #667eea;
            color: white;
        }

        .submit-btn:hover:not(:disabled) {
            background: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .back-btn {
            background: #f0f0f0;
            color: #333;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            display: block;
        }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-number {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 5px;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .result-description {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }

        .copy-btn {
            background: transparent;
            color: inherit;
            border: 1px solid currentColor;
            padding: 8px 16px;
            margin-top: 10px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
        }

        .copy-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📤 URL送信</h1>
        <p class="description">URLを入力して、1回限りの共有コードを発行します（短縮URLではありません）</p>

        <div class="form-group">
            <label for="urlInput">URL</label>
            <input 
                type="url" 
                id="urlInput" 
                placeholder="https://example.com" 
                required
                autocomplete="off"
            >
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">生成中...</p>
        </div>

        <div class="button-group">
            <button class="submit-btn" id="submitBtn" onclick="submitUrl()">コードを発行</button>
            <button class="back-btn" onclick="goBack()">戻る</button>
        </div>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-number" id="resultNumber"></div>
            <div class="result-description" id="resultDescription"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyNumber()">コピー</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultNumber = document.getElementById('resultNumber');
        const resultDescription = document.getElementById('resultDescription');
        const loading = document.getElementById('loading');
        const copyBtn = document.getElementById('copyBtn');

        async function submitUrl() {
            const url = urlInput.value.trim();

            if (!url) {
                alert('URLを入力してください');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('http(s)で始まるURLを入力してください');
                return;
            }

            submitBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                const res = await fetch('/create_reservation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await res.json();

                if (res.ok) {
                    resultTitle.textContent = '✓ コードを発行しました';
                    resultNumber.textContent = data.reservation_number;
                    resultDescription.textContent = '1回限りの使い捨てコードです。受信側の端末に入力するとURLが開きます。';
                    result.classList.remove('error');
                    result.classList.add('success');
                    result.style.display = 'block';
                    urlInput.value = '';
                    copyBtn.textContent = 'コピーする';
                } else {
                    resultTitle.textContent = '✗ エラーが発生しました';
                    resultDescription.textContent = data.error || 'コードの発行に失敗しました';
                    result.classList.remove('success');
                    result.classList.add('error');
                    result.style.display = 'block';
                }
            } catch (err) {
                resultTitle.textContent = '✗ 通信エラー';
                resultDescription.textContent = 'サーバーに接続できません。もう一度お試しください。';
                result.classList.remove('success');
                result.classList.add('error');
                result.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function copyNumber() {
            const number = resultNumber.textContent;
            navigator.clipboard.writeText(number).then(() => {
                copyBtn.textContent = '✓ コピーしました';
                setTimeout(() => {
                    copyBtn.textContent = 'コピーする';
                }, 2000);
            }).catch(() => {
                alert('コピーに失敗しました');
            });
        }

        function goBack() {
            window.location.href = '/';
        }

        // Enterキーで送信
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitUrl();
            }
        });

        // フォーカス時の処理
        urlInput.addEventListener('focus', () => {
            result.style.display = 'none';
        });
    </script>
</body>

</html>
